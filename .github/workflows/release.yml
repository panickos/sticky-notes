name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Run tests
        run: cd StickyNotes && swift test

      - name: Build app bundle
        run: cd StickyNotes && ./Scripts/package-app.sh release

      - name: Create release zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd StickyNotes/dist
          ditto -c -k --sequesterRsrc --keepParent StickyNotes.app "StickyNotes-${VERSION}.zip"
          ls -lh "StickyNotes-${VERSION}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: StickyNotes/dist/StickyNotes-*.zip
